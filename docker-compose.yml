services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: hfv
      POSTGRES_PASSWORD: hfv
      POSTGRES_DB: hfv
    ports:
      - "5432:5432"
    volumes:
      - hfv_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hfv -d hfv"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: ../infra/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://hfv:hfv@db:5432/hfv
      FRED_API_KEY: ${FRED_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  hfv_pgdata:
