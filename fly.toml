app = "housingfairvalue-api"
primary_region = "iad"

[build]
  dockerfile = "infra/api.Dockerfile"

[env]
  ALLOWED_ORIGINS = "https://housingfairvalue.vercel.app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
